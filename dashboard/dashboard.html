<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV 라이프 케어 관제 대시보드</title>
    <!-- Chart.js 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --accent-red: #f87171;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header 영역 */
        .header { display: flex; justify-content: space-between; align-items: center; background-color: var(--panel-bg); padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background-color: #475569; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .status-badge { background-color: rgba(74, 222, 128, 0.2); color: var(--accent-green); padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-badge.warning { background-color: rgba(248, 113, 113, 0.2); color: var(--accent-red); }
        .status-badge::before { content: ''; width: 8px; height: 8px; background-color: var(--accent-green); border-radius: 50%; display: inline-block; }
        .status-badge.warning::before { background-color: var(--accent-red); }
        .device-status { display: flex; gap: 20px; font-size: 15px; color: var(--text-muted); }
        .device-status span { color: var(--accent-blue); font-weight: bold; }

        /* Main Grid 영역 */
        .main-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; flex-grow: 1; margin-bottom: 20px; }
        .panel { background-color: var(--panel-bg); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .panel-title { font-size: 16px; font-weight: 500; color: var(--text-muted); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

        /* 타임라인 커스텀 UI */
        .timeline-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .timeline-labels { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 12px; margin-bottom: 5px; }
        .timeline-track { width: 100%; height: 60px; background-color: #0f172a; border-radius: 8px; display: flex; overflow: hidden; position: relative; }
        .segment { height: 100%; transition: width 0.5s ease; }
        .seg-active { background-color: var(--accent-blue); }
        .seg-idle { background-color: var(--accent-yellow); }
        .seg-sleep { background-color: transparent; }
        .timeline-legend { display: flex; justify-content: center; gap: 15px; margin-top: 15px; font-size: 12px; color: var(--text-muted); }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-box { width: 12px; height: 12px; border-radius: 3px; }

        /* Chart 및 기타 UI */
        .chart-wrapper { position: relative; height: 160px; width: 100%; margin-bottom: 15px; }
        .micro-stats { display: flex; justify-content: space-between; text-align: center; margin-top: 10px; }
        .micro-stats div { background-color: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; width: 48%; }
        .micro-stats div h4 { font-size: 12px; color: var(--text-muted); font-weight: normal; margin-bottom: 5px; }
        .micro-stats div p { font-size: 20px; font-weight: bold; color: var(--accent-blue); }
        .word-cloud { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 10px; }
        .footer { background-color: var(--panel-bg); border-radius: 12px; padding: 15px 25px; display: flex; flex-direction: column; gap: 5px; }
        .footer-title { color: var(--accent-blue); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .footer-text { font-size: 14px; color: var(--text-main); line-height: 1.5; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="user-info">
            <div class="avatar">👵</div>
            <div>
                <div style="font-size: 18px; font-weight: bold; margin-bottom: 3px;" id="profile-name">로딩 중...</div>
                <div class="status-badge" id="profile-status">데이터 연결 중</div>
            </div>
        </div>
        <div class="device-status">
            <div>📺 TV: <span id="dev-tv">-</span> (볼륨 <span id="dev-vol">-</span>, <span id="dev-ch">-</span>)</div>
            <div>💡 조명: <span id="dev-light">-</span></div>
            <div>🌡️ 온도: <span id="dev-temp">-</span>°C</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-grid">
        <div class="panel">
            <div class="panel-title">24H 생활 활동 타임라인</div>
            <div class="timeline-container">
                <div class="timeline-labels">
                    <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
                </div>
                <div class="timeline-track" id="timeline-track"></div>
                <div class="timeline-legend">
                    <div class="legend-item"><div class="legend-box seg-active"></div> 능동 시청 (조작 O)</div>
                    <div class="legend-item"><div class="legend-box seg-idle"></div> 수동 시청 (조작 X)</div>
                    <div class="legend-item"><div class="legend-box" style="background:#0f172a; border:1px solid #334155;"></div> TV 꺼짐 (외출/수면)</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">마이크로 행동 패턴 (리모컨/볼륨)</div>
            <div class="chart-wrapper"><canvas id="behaviorChart"></canvas></div>
            <div class="micro-stats">
                <div><h4>평균 채널 체류 시간</h4><p id="stat-zap-avg">-</p></div>
                <div><h4>분당 최대 채널 변경</h4><p id="stat-zap-max">-</p></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">정서 및 콘텐츠 선호도</div>
            <div style="display:flex; height: 140px; margin-bottom: 20px;">
                <div style="width: 50%; display: flex; flex-direction: column; align-items: center;">
                    <span style="font-size:12px; color:var(--text-muted);">주간 선호 장르</span>
                    <canvas id="contentChart" style="max-height:100px; margin-top:10px;"></canvas>
                </div>
                <div style="width: 50%; display: flex; flex-direction: column; align-items: center;">
                    <span style="font-size:12px; color:var(--text-muted);">AI 정서 지수</span>
                    <canvas id="emotionChart" style="max-height:100px; margin-top:10px;"></canvas>
                </div>
            </div>
            <div class="panel-title" style="border:none; padding:0; margin:0; font-size:14px;">최근 발화 키워드</div>
            <div class="word-cloud" id="word-cloud"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-title">🤖 AI 종합 인사이트 및 케어 예측</div>
        <div class="footer-text" id="ai-insights">데이터를 분석 중입니다...</div>
    </div>

    <!-- 데이터 포팅 및 렌더링 스크립트 -->
    <script>
        // Chart.js 공통 설정 (다크테마)
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

        // JSON 데이터 비동기 호출
        async function loadData() {
            try {
                // 외부 json 파일 호출 (포팅)
                const response = await fetch('data.json'); 
                if (!response.ok) throw new Error('데이터를 불러올 수 없습니다.');
                const mockData = await response.json();
                
                renderDashboard(mockData);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('ai-insights').innerHTML = `<span style="color:#f87171;">🚨 데이터를 불러오는 데 실패했습니다. 로컬 서버 환경(Live Server 등)에서 실행 중인지 확인해주세요.</span>`;
            }
        }

        // 받아온 데이터로 화면 그리기 함수
        function renderDashboard(data) {
            // 1. 텍스트 데이터 바인딩
            document.getElementById('profile-name').innerText = `${data.profile.name} 어르신 (${data.profile.age}세, ${data.profile.gender})`;
            
            const statusEl = document.getElementById('profile-status');
            statusEl.innerText = data.profile.status;
            // '경고'나 '주의' 상태면 빨간색 스타일 적용
            if (data.profile.status !== '정상') statusEl.classList.add('warning');
            
            document.getElementById('dev-tv').innerText = data.device.tv;
            document.getElementById('dev-vol').innerText = data.device.volume;
            document.getElementById('dev-ch').innerText = data.device.channel;
            document.getElementById('dev-light').innerText = data.device.light;
            document.getElementById('dev-temp').innerText = data.device.temp;
            document.getElementById('stat-zap-avg').innerText = data.zappingAvg;
            document.getElementById('stat-zap-max').innerText = data.zappingMax;
            document.getElementById('ai-insights').innerHTML = data.insights;

            // 2. 타임라인 렌더링
            const track = document.getElementById('timeline-track');
            track.innerHTML = ''; // 초기화
            const totalMinutes = 1440;
            data.timeline.forEach(seg => {
                const widthPct = (seg.durationMinutes / totalMinutes) * 100;
                const div = document.createElement('div');
                div.className = `segment seg-${seg.state}`;
                div.style.width = `${widthPct}%`;
                track.appendChild(div);
            });

            // 3. 워드 클라우드 렌더링
            const wcContainer = document.getElementById('word-cloud');
            wcContainer.innerHTML = ''; // 초기화
            data.keywords.forEach(kw => {
                const span = document.createElement('span');
                span.innerText = kw.word;
                span.style.fontSize = `${kw.size}px`;
                span.style.color = kw.color;
                span.style.fontWeight = 'bold';
                wcContainer.appendChild(span);
            });

            // 4. 행동 패턴 차트
            new Chart(document.getElementById('behaviorChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [
                        { label: '볼륨', data: data.volumeLevels, type: 'line', borderColor: '#4ade80', backgroundColor: 'rgba(74, 222, 128, 0.1)', fill: true, tension: 0.4, yAxisID: 'y' },
                        { label: '클릭수', data: data.remoteClicks, backgroundColor: '#38bdf8', borderRadius: 4, yAxisID: 'y1' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#334155' } }, y: { display: false }, y1: { display: false } } }
            });

            // 5. 콘텐츠 파이 차트
            new Chart(document.getElementById('contentChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['트로트', '뉴스', '건강', '기타'], datasets: [{ data: data.content, backgroundColor: ['#38bdf8', '#4ade80', '#facc15', '#94a3b8'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '70%' }
            });

            // 6. 감정 상태 차트
            new Chart(document.getElementById('emotionChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['현재 감정', ''], datasets: [{ data: [data.emotionScore, 100 - data.emotionScore], backgroundColor: ['#facc15', '#334155'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
        }

        // 페이지 로드 시 데이터 호출 시작
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
