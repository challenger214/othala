<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV 라이프 케어 관제 대시보드</title>
    <!-- Chart.js 및 DataLabels 플러그인 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent-blue: #38bdf8; --accent-green: #4ade80; --accent-yellow: #facc15; --accent-red: #f87171;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header (고정 높이) */
        .header { display: flex; justify-content: space-between; align-items: center; background-color: var(--panel-bg); padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; flex-shrink: 0; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background-color: #475569; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .status-badge { background-color: rgba(74, 222, 128, 0.2); color: var(--accent-green); padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-badge.warning { background-color: rgba(248, 113, 113, 0.2); color: var(--accent-red); }
        .status-badge::before { content: ''; width: 8px; height: 8px; background-color: var(--accent-green); border-radius: 50%; display: inline-block; }
        .status-badge.warning::before { background-color: var(--accent-red); }
        .device-status { display: flex; gap: 20px; font-size: 15px; color: var(--text-muted); }
        .device-status span { color: var(--accent-blue); font-weight: bold; }

        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; flex: 1; margin-bottom: 20px; min-height: 0; }
        .panel { background-color: var(--panel-bg); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; min-height: 0; }
        .panel-title { font-size: 16px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; flex-shrink: 0; }

        /* 🚨 타임라인 영역 (두께 80% 수준으로 축소 및 중앙 배치) */
        .timeline-container { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .timeline-visual-area { position: relative; flex: 1; display: flex; flex-direction: column; padding-top: 60px; min-height: 0; } 
        .timeline-markers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .marker-group { position: absolute; height: 100%; display: flex; flex-direction: column; align-items: center; transform: translateX(-50%); }
        .marker-content { text-align: center; background-color: var(--panel-bg); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .marker-icon { font-size: 18px; margin-bottom: 2px; }
        .marker-time { color: var(--accent-blue); font-size: 13px; font-weight: bold; }
        .marker-label { color: #fff; font-size: 12px; font-weight: 500; }
        .marker-line { width: 2px; flex: 1; background-color: rgba(56, 189, 248, 0.5); margin-top: 4px; }
        
        .timeline-track { flex: 0.5; margin: auto 0; width: 100%; background-color: #0f172a; border-radius: 8px; display: flex; overflow: hidden; border: 1px solid var(--border-color); }
        .segment { height: 100%; transition: width 0.5s ease; }
        .seg-active { background-color: var(--accent-blue); }
        .seg-idle { background-color: var(--accent-yellow); }
        .seg-sleep { background-color: transparent; }
        
        .timeline-labels { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 12px; margin-top: 10px; flex-shrink: 0; }
        .timeline-legend { display: flex; justify-content: center; gap: 15px; margin-top: 15px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-box { width: 12px; height: 12px; border-radius: 3px; }

        /* 🚨 마이크로 차트 영역 (위아래 80% 높이 적용) */
        .chart-wrapper { position: relative; flex: 1; width: 100%; min-height: 0; }
        .chart-wrapper canvas { position: absolute; top: 10%; left: 0; width: 100% !important; height: 80% !important; }
        
        .micro-stats { display: flex; justify-content: space-between; text-align: center; margin-top: 15px; flex-shrink: 0; }
        .micro-stats div { background-color: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; width: 48%; border: 1px solid var(--border-color); }
        .micro-stats div h4 { font-size: 12px; color: var(--text-muted); font-weight: normal; margin-bottom: 5px; }
        .micro-stats div p { font-size: 22px; font-weight: bold; color: var(--accent-blue); }

        /* 🚨 도넛 차트 영역 (위아래 80% 높이 적용) */
        .doughnut-charts-container { display: flex; flex: 1; gap: 15px; min-height: 0; }
        .chart-col { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chart-label-top { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 10px; flex-shrink: 0; }
        
        .doughnut-wrapper { position: relative; flex: 1; width: 100%; min-height: 0; }
        .doughnut-wrapper canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
        
        /* 정서 지수 한가운데 텍스트 표시용 */
        .emotion-score-center { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: bold; color: var(--accent-yellow); pointer-events: none; }
        .emotion-labels { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; font-size: 12px; color: var(--text-muted); position: absolute; bottom: 0; }
        .emotion-labels span:last-child { color: var(--accent-yellow); }

        .word-cloud-title { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; flex-shrink: 0; }
        .word-cloud { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; flex-shrink: 0; }
        
        /* Footer (고정 높이) */
        .footer { background-color: var(--panel-bg); border-radius: 12px; padding: 15px 25px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .footer-title { color: var(--accent-blue); font-weight: bold; font-size: 16px; }
        .footer-text { font-size: 15px; color: var(--text-main); line-height: 1.5; background-color: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 8px; border-left: 4px solid var(--accent-blue); }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div class="avatar">👵</div>
            <div>
                <div style="font-size: 18px; font-weight: bold; margin-bottom: 3px;" id="profile-name">로딩 중...</div>
                <div class="status-badge" id="profile-status">데이터 연결 중</div>
            </div>
        </div>
        <div class="device-status">
            <div>📺 TV: <span id="dev-tv">-</span> (볼륨 <span id="dev-vol">-</span>, <span id="dev-ch">-</span>)</div>
            <div>💡 조명: <span id="dev-light">-</span></div>
            <div>🌡️ 온도: <span id="dev-temp">-</span>°C</div>
        </div>
    </div>

    <div class="main-grid">
        <!-- 1. 타임라인 패널 -->
        <div class="panel">
            <div class="panel-title">24H 생활 활동 타임라인</div>
            <div class="timeline-container">
                <div class="timeline-visual-area">
                    <div class="timeline-markers" id="timeline-markers"></div>
                    <div class="timeline-track" id="timeline-track"></div>
                </div>
                <div class="timeline-labels">
                    <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
                </div>
                <div class="timeline-legend">
                    <div class="legend-item"><div class="legend-box seg-active"></div> 능동 시청</div>
                    <div class="legend-item"><div class="legend-box seg-idle"></div> 수동 시청</div>
                    <div class="legend-item"><div class="legend-box" style="background:#0f172a; border:1px solid #334155;"></div> TV 꺼짐</div>
                </div>
            </div>
        </div>

        <!-- 2. 마이크로 행동 패널 -->
        <div class="panel">
            <div class="panel-title">마이크로 행동 패턴 (리모컨/볼륨)</div>
            <div class="chart-wrapper">
                <canvas id="behaviorChart"></canvas>
            </div>
            <div class="micro-stats">
                <div><h4>평균 채널 체류 시간</h4><p id="stat-zap-avg">-</p></div>
                <div><h4>분당 최대 채널 변경</h4><p id="stat-zap-max">-</p></div>
            </div>
        </div>

        <!-- 3. 정서 및 콘텐츠 패널 -->
        <div class="panel">
            <div class="panel-title">정서 및 콘텐츠 선호도</div>
            <div class="doughnut-charts-container">
                <!-- 장르 차트 -->
                <div class="chart-col">
                    <div class="chart-label-top">주간 선호 장르</div>
                    <div class="doughnut-wrapper">
                        <canvas id="contentChart"></canvas>
                    </div>
                </div>
                <!-- 감정 차트 -->
                <div class="chart-col">
                    <div class="chart-label-top">AI 정서 지수</div>
                    <div class="doughnut-wrapper">
                        <canvas id="emotionChart"></canvas>
                        <!-- 가운데 텍스트 강제 삽입 -->
                        <div class="emotion-score-center" id="emotion-score-text">-</div>
                        <div class="emotion-labels"><span>부정적</span><span>긍정적</span></div>
                    </div>
                </div>
            </div>
            <div class="word-cloud-title">최근 주요 발화 키워드</div>
            <div class="word-cloud" id="word-cloud"></div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-title">🤖 AI 종합 인사이트 및 케어 예측</div>
        <div class="footer-text" id="ai-insights">데이터 분석 중...</div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

        let behaviorChartInstance = null;
        let contentChartInstance = null;
        let emotionChartInstance = null;

        async function loadData(url = 'data.json') {
            try {
                const response = await fetch(url); 
                if (!response.ok) throw new Error('데이터 로드 실패');
                const mockData = await response.json();
                renderDashboard(mockData);
            } catch (error) {
                console.error(error);
                document.getElementById('ai-insights').innerHTML = `<span style="color:#f87171;">🚨 데이터를 불러오는 데 실패했습니다.</span>`;
            }
        }

        function renderDashboard(data) {
            document.getElementById('profile-name').innerText = `${data.profile.name} 어르신 (${data.profile.age}세, ${data.profile.gender})`;
            
            const statusEl = document.getElementById('profile-status');
            statusEl.innerText = data.profile.status;
            statusEl.classList.remove('warning');
            if (data.profile.status !== '정상') statusEl.classList.add('warning');
            
            document.getElementById('dev-tv').innerText = data.device.tv;
            document.getElementById('dev-vol').innerText = data.device.volume;
            document.getElementById('dev-ch').innerText = data.device.channel;
            document.getElementById('dev-light').innerText = data.device.light;
            document.getElementById('dev-temp').innerText = data.device.temp;
            document.getElementById('stat-zap-avg').innerText = data.zappingAvg;
            document.getElementById('stat-zap-max').innerText = data.zappingMax;
            document.getElementById('ai-insights').innerHTML = data.insights;

            const markersContainer = document.getElementById('timeline-markers');
            markersContainer.innerHTML = '';
            if(data.events) {
                data.events.forEach(ev => {
                    const [hours, minutes] = ev.time.split(':').map(Number);
                    const pct = (((hours * 60) + minutes) / 1440) * 100;

                    const markerGroup = document.createElement('div');
                    markerGroup.className = 'marker-group';
                    markerGroup.style.left = `${pct}%`;

                    markerGroup.innerHTML = `
                        <div class="marker-content">
                            <div class="marker-icon">${ev.icon}</div>
                            <div class="marker-time">${ev.time}</div>
                            <div class="marker-label">${ev.label}</div>
                        </div>
                        <div class="marker-line"></div>
                    `;
                    markersContainer.appendChild(markerGroup);
                });
            }

            const track = document.getElementById('timeline-track');
            track.innerHTML = ''; 
            data.timeline.forEach(seg => {
                const widthPct = (seg.durationMinutes / 1440) * 100;
                const div = document.createElement('div');
                div.className = `segment seg-${seg.state}`;
                div.style.width = `${widthPct}%`;
                track.appendChild(div);
            });

            const wcContainer = document.getElementById('word-cloud');
            wcContainer.innerHTML = ''; 
            data.keywords.forEach(kw => {
                const span = document.createElement('span');
                span.innerText = kw.word;
                span.style.fontSize = `${kw.size}px`;
                span.style.color = kw.color;
                span.style.fontWeight = 'bold';
                wcContainer.appendChild(span);
            });

            if (behaviorChartInstance) behaviorChartInstance.destroy();
            if (contentChartInstance) contentChartInstance.destroy();
            if (emotionChartInstance) emotionChartInstance.destroy();

            // 행동 패턴 차트
            behaviorChartInstance = new Chart(document.getElementById('behaviorChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [
                        { label: '볼륨', data: data.volumeLevels, type: 'line', borderColor: '#4ade80', backgroundColor: 'rgba(74, 222, 128, 0.1)', fill: true, tension: 0.4, yAxisID: 'y' },
                        { label: '클릭수', data: data.remoteClicks, backgroundColor: '#38bdf8', borderRadius: 4, yAxisID: 'y1' }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false }, datalabels: { display: false } }, 
                    scales: { x: { grid: { color: '#334155' } }, y: { display: false }, y1: { display: false } } 
                }
            });

            // 장르 선호도 차트
            const contentLabels = ['트로트', '뉴스', '건강', '기타'];
            contentChartInstance = new Chart(document.getElementById('contentChart').getContext('2d'), {
                type: 'doughnut',
                data: { 
                    labels: contentLabels, 
                    datasets: [{ data: data.content, backgroundColor: ['#38bdf8', '#4ade80', '#facc15', '#64748b'], borderWidth: 0 }] 
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, cutout: '50%',
                    plugins: { 
                        legend: { display: false },
                        tooltip: { enabled: false }, 
                        datalabels: { 
                            color: '#fff',
                            font: { weight: 'bold', size: 12 },
                            formatter: (value, ctx) => {
                                if(value < 10) return '';
                                return contentLabels[ctx.dataIndex] + '\n' + value + '%';
                            },
                            textAlign: 'center'
                        }
                    } 
                }
            });

            // 감정 상태 반원 차트
            document.getElementById('emotion-score-text').innerText = data.emotionScore + '점';
            emotionChartInstance = new Chart(document.getElementById('emotionChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['긍정 지수', ''], datasets: [{ data: [data.emotionScore, 100 - data.emotionScore], backgroundColor: ['#facc15', '#334155'], borderWidth: 0 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, cutout: '75%', 
                    plugins: { legend: { display: false }, tooltip: { enabled: false }, datalabels: { display: false } } 
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => loadData('data.json'));
        document.addEventListener('keydown', (event) => {
            if (event.key === '0') loadData('data.json');
            if (event.key === '1') loadData('scenario1.json');
            if (event.key === '2') loadData('scenario2.json');
            if (event.key === '3') loadData('scenario3.json');
        });
    </script>
</body>
</html>
